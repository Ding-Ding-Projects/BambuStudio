<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bambu Studio MD3 — UI kit</title>
<link rel="stylesheet" href="../../styles.css">
<style>html,body,#app{height:100%;overflow:hidden;}</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
// ---- Components.jsx (inlined by assembler; edit the .jsx and re-assemble) ----
// Kit-local mirror of /components primitives (no module system in this standalone shell).
const { useState } = React;
const MD = window.MD = {};

MD.Button = function Button({ variant = 'filled', size = 'md', icon, iconFill, elevated, onClick, title, style, children }) {
  const [hov, setHov] = useState(false);
  const h = { sm: 36, md: 42, lg: 44 }[size] || 42;
  const pad = { sm: 16, md: 18, lg: 22 }[size] || 18;
  const v = {
    filled: { background: 'var(--md-primary)', color: 'var(--md-on-primary)', border: 'none', fontWeight: 600 },
    tonal: { background: 'var(--md-secondary-container)', color: 'var(--md-on-secondary-container)', border: 'none', fontWeight: 600 },
    outlined: { background: 'transparent', color: 'var(--md-on-surface)', border: '1px solid var(--md-outline)', fontWeight: 500 },
    text: { background: 'transparent', color: 'var(--md-primary)', border: 'none', fontWeight: 600 },
    danger: { background: 'transparent', color: 'var(--md-error)', border: '1px solid var(--md-error)', fontWeight: 600 },
  }[variant];
  const hover = hov ? (variant === 'filled' ? { filter: 'brightness(1.06)' } : variant === 'tonal' ? { filter: 'brightness(1.04)' } : { background: variant === 'text' ? 'var(--md-secondary-container)' : 'var(--md-sc-high)' }) : {};
  return <button title={title} onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
    style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8, height: h, padding: '0 ' + pad + 'px', borderRadius: h / 2, cursor: 'pointer', fontFamily: 'var(--md-font)', fontSize: size === 'sm' ? 12.5 : size === 'lg' ? 14 : 13.5, boxShadow: elevated ? 'var(--md-elev-2)' : 'none', transition: '.15s', ...v, ...hover, ...style }}>
    {icon && <span data-icon style={{ fontSize: size === 'sm' ? 18 : 20, fontVariationSettings: iconFill ? "'FILL' 1" : undefined }}>{icon}</span>}{children}</button>;
};

MD.IconButton = function IconButton({ icon, size = 36, iconSize, title, danger, filled, shape = 'circle', onClick, style }) {
  const [hov, setHov] = useState(false);
  return <button title={title} onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
    style={{ width: size + (shape === 'square' ? 4 : 0), height: size, border: 'none', cursor: 'pointer', borderRadius: shape === 'circle' ? '50%' : 8,
      background: hov ? (danger ? 'var(--md-error)' : 'var(--md-sc-high)') : filled ? 'var(--md-sc-highest)' : 'transparent',
      color: hov && danger ? 'var(--md-on-error)' : 'var(--md-on-surface-variant)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', transition: '.15s', ...style }}>
    <span data-icon style={{ fontSize: iconSize || (size >= 40 ? 22 : size >= 34 ? 19 : 17) }}>{icon}</span></button>;
};

MD.Chip = function Chip({ label, icon, selected, tonal, mono, onClick, style }) {
  const [hov, setHov] = useState(false);
  const sel = selected
    ? tonal ? { background: 'var(--md-secondary-container)', color: 'var(--md-on-secondary-container)', border: '1px solid var(--md-primary)' }
            : { background: 'var(--md-primary)', color: 'var(--md-on-primary)', border: '1px solid var(--md-primary)' }
    : { background: hov ? 'var(--md-sc-high)' : 'transparent', color: 'var(--md-on-surface-variant)', border: '1px solid var(--md-outline)' };
  return <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
    style={{ display: 'inline-flex', alignItems: 'center', gap: 6, height: 30, padding: '0 13px', borderRadius: 15, cursor: 'pointer', fontSize: 12, fontWeight: 500, transition: '.15s', fontFamily: mono ? 'var(--md-font-mono)' : 'var(--md-font)', ...sel, ...style }}>
    {icon && <span data-icon style={{ fontSize: 16 }}>{icon}</span>}{label}</button>;
};

MD.SegmentedControl = function SegmentedControl({ options, value, onChange, size = 'sm', grow = true, style }) {
  const md = size === 'md';
  return <div style={{ display: 'flex', gap: md ? 6 : 4, padding: md ? 4 : 3, background: 'var(--md-sc-highest)', borderRadius: md ? 14 : 12, ...style }}>
    {options.map(o => { const on = o.id === value; return <button key={o.id} onClick={() => onChange && onChange(o.id)}
      style={{ flex: grow ? 1 : 'none', height: md ? 36 : 30, padding: '0 ' + (md ? 18 : 10) + 'px', border: 'none', borderRadius: md ? 11 : 9, cursor: 'pointer', fontSize: md ? 12.5 : 11.5, fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        background: on ? 'var(--md-primary)' : 'transparent', color: on ? 'var(--md-on-primary)' : 'var(--md-on-surface-variant)', transition: '.15s' }}>
      {o.icon && <span data-icon style={{ fontSize: 18 }}>{o.icon}</span>}{o.label}</button>; })}</div>;
};

MD.Switch = function Switch({ checked, onChange, style }) {
  return <button onClick={() => onChange && onChange(!checked)}
    style={{ width: 44, height: 24, borderRadius: 14, position: 'relative', cursor: 'pointer', padding: 0, flex: '0 0 auto', transition: '.15s',
      border: '2px solid ' + (checked ? 'var(--md-primary)' : 'var(--md-outline)'), background: checked ? 'var(--md-primary)' : 'transparent', ...style }}>
    <span style={{ position: 'absolute', top: '50%', transform: 'translateY(-50%)', transition: '.15s', borderRadius: '50%', left: checked ? 22 : 4, width: checked ? 16 : 12, height: checked ? 16 : 12, background: checked ? 'var(--md-on-primary)' : 'var(--md-outline)' }} /></button>;
};

MD.SectionHeader = function SectionHeader({ icon, trailing, style, children }) {
  return <div style={{ display: 'flex', alignItems: 'center', gap: 6, ...style }}>
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, fontWeight: 600, letterSpacing: '.6px', color: 'var(--md-on-surface-variant)', textTransform: 'uppercase' }}>
      {icon && <span data-icon style={{ fontSize: 16 }}>{icon}</span>}{children}</div>{trailing}</div>;
};

MD.Badge = ({ style, children }) => <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 7, background: 'var(--md-secondary-container)', color: 'var(--md-on-secondary-container)', ...style }}>{children}</span>;
MD.ProgressBar = ({ value, height = 8, style }) => <div style={{ height, background: 'var(--md-sc-highest)', borderRadius: 6, overflow: 'hidden', ...style }}><div style={{ width: value + '%', height: '100%', background: 'var(--md-primary)', borderRadius: 6, transition: 'width .3s' }} /></div>;

MD.SelectField = function SelectField({ value, filled, caption, onClick, style }) {
  const inner = filled ? { height: 34, padding: '0 8px 0 12px', background: 'var(--md-sc-highest)', border: 'none', borderRadius: 10, gap: 4 }
    : { height: 38, padding: '0 12px', background: 'transparent', border: '1px solid var(--md-outline)', borderRadius: 10, justifyContent: 'space-between', width: '100%' };
  return <div style={{ display: 'flex', flexDirection: 'column', gap: 3, ...style }}>
    {caption && <div style={{ fontSize: 10.5, color: 'var(--md-on-surface-variant)', paddingLeft: 4 }}>{caption}</div>}
    <button onClick={onClick} style={{ display: 'flex', alignItems: 'center', cursor: 'pointer', color: 'var(--md-on-surface)', fontSize: 12.5, fontFamily: 'var(--md-font)', ...inner }}>
      <span style={{ fontWeight: filled ? 400 : 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{value}</span>
      <span data-icon style={{ fontSize: filled ? 16 : 18, color: 'var(--md-on-surface-variant)' }}>expand_more</span></button></div>;
};

MD.ValueField = ({ value, unit, minWidth = 96, style }) => <div style={{ display: 'flex', alignItems: 'center', gap: 6, height: 34, padding: '0 4px 0 12px', background: 'var(--md-sc-highest)', borderRadius: 10, minWidth, justifyContent: 'flex-end', ...style }}>
  <span style={{ fontFamily: 'var(--md-font-mono)', fontSize: 12.5, fontWeight: 500, color: 'var(--md-on-surface)' }}>{value}</span>
  {unit && <span style={{ fontSize: 11, color: 'var(--md-on-surface-variant)', paddingRight: 8 }}>{unit}</span>}</div>;

MD.SearchField = function SearchField({ placeholder = 'Search', onQuery, style }) {
  const [value, setValue] = useState('');
  const [regex, setRegex] = useState(false);
  return <div style={{ position: 'relative', width: '100%', fontFamily: 'var(--md-font)', ...style }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 4, height: 40, padding: '0 5px 0 14px', background: 'var(--md-sc-highest)', border: '1px solid var(--md-outline)', borderRadius: 22 }}>
      <span data-icon style={{ fontSize: 20, color: 'var(--md-on-surface-variant)' }}>search</span>
      <input value={value} placeholder={placeholder} onChange={e => { setValue(e.target.value); onQuery && onQuery(e.target.value); }}
        style={{ flex: 1, minWidth: 0, border: 'none', background: 'transparent', outline: 'none', color: 'var(--md-on-surface)', fontSize: 13.5, fontFamily: regex ? 'var(--md-font-mono)' : 'inherit' }} />
      {!!value && <MD.IconButton icon="close" size={30} title="Clear" onClick={() => { setValue(''); onQuery && onQuery(''); }} />}
      <button title="Use regular expression" onClick={() => setRegex(!regex)}
        style={{ minWidth: 32, height: 30, padding: '0 4px', border: 'none', borderRadius: 8, cursor: 'pointer', fontFamily: 'var(--md-font-mono)', fontSize: 12.5, fontWeight: 700,
          background: regex ? 'var(--md-primary)' : 'var(--md-sc-low)', color: regex ? 'var(--md-on-primary)' : 'var(--md-on-surface-variant)' }}>.*</button>
    </div></div>;
};

MD.Card = function Card({ interactive, pad = true, radius, onClick, style, children }) {
  const [hov, setHov] = useState(false);
  return <div onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
    style={{ background: 'var(--md-sc-low)', borderRadius: radius || 'var(--radius)', cursor: interactive ? 'pointer' : 'default',
      border: '1px solid ' + (interactive && hov ? 'var(--md-primary)' : 'var(--md-outline-variant)'), padding: pad ? 'var(--pad)' : 0, transition: 'border-color .15s', ...style }}>{children}</div>;
};

// Shared viewport mock: build plate + isometric model
MD.Viewport = function Viewport({ children, model = true, modelStyle }) {
  return <div style={{ flex: 1, position: 'relative', overflow: 'hidden', background: 'radial-gradient(120% 100% at 50% 0%, var(--md-surface-bright), var(--md-surface-dim) 70%)' }}>
    <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', perspective: 1400 }}>
      <div style={{ width: 520, height: 360, transform: 'rotateX(58deg) rotateZ(-38deg)', background: 'linear-gradient(var(--md-sc-high),var(--md-sc))', border: '1px solid var(--md-outline)', borderRadius: 6,
        backgroundImage: 'repeating-linear-gradient(0deg,transparent 0 25px, color-mix(in srgb, var(--md-outline) 34%, transparent) 25px 26px), repeating-linear-gradient(90deg,transparent 0 25px, color-mix(in srgb, var(--md-outline) 34%, transparent) 25px 26px)',
        boxShadow: '0 40px 60px rgba(0,0,0,.28)' }} />
    </div>
    {model && <div style={{ position: 'absolute', left: '50%', top: '44%', transform: 'translate(-50%,-50%)', width: 150, height: 164, filter: 'drop-shadow(0 20px 16px rgba(0,0,0,.35))', ...modelStyle }}>
      <div style={{ position: 'absolute', inset: 0, background: 'color-mix(in srgb, var(--md-primary) 84%, #fff)', clipPath: 'polygon(50% 2%, 98% 27%, 50% 52%, 2% 27%)' }} />
      <div style={{ position: 'absolute', inset: 0, background: 'color-mix(in srgb, var(--md-primary) 60%, #000 8%)', clipPath: 'polygon(2% 27%, 50% 52%, 50% 98%, 2% 73%)' }} />
      <div style={{ position: 'absolute', inset: 0, background: 'color-mix(in srgb, var(--md-primary) 42%, #000 22%)', clipPath: 'polygon(98% 27%, 98% 73%, 50% 98%, 50% 52%)' }} />
    </div>}
    {children}
  </div>;
};

MD.Checkbox = function Checkbox({ checked, label, onChange, style }) {
  return <button onClick={() => onChange && onChange(!checked)}
    style={{ display: 'inline-flex', alignItems: 'center', gap: 8, border: 'none', background: 'transparent', cursor: 'pointer',
      color: 'var(--md-on-surface)', fontSize: 12.5, fontWeight: 500, fontFamily: 'var(--md-font)', padding: '6px 8px', borderRadius: 8, ...style }}>
    <span data-icon style={{ fontSize: 20, color: checked ? 'var(--md-primary)' : 'var(--md-on-surface-variant)' }}>
      {checked ? 'check_box' : 'check_box_outline_blank'}
    </span>
    {label}
  </button>;
};

MD.NavItem = function NavItem({ icon, label, selected, onClick, style }) {
  const [hov, setHov] = useState(false);
  return <div onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
    style={{ display: 'flex', alignItems: 'center', gap: 10, height: 44, padding: '0 14px', borderRadius: 22, cursor: 'pointer',
      background: selected ? 'var(--md-secondary-container)' : hov ? 'var(--md-sc-high)' : 'transparent',
      color: selected ? 'var(--md-on-secondary-container)' : 'var(--md-on-surface-variant)',
      fontSize: 13.5, fontWeight: selected ? 600 : 400, fontFamily: 'var(--md-font)', ...style }}>
    <span data-icon style={{ fontSize: 20 }}>{icon}</span> {label}
  </div>;
};

</script>
<script type="text/babel">
// ---- Home.jsx (inlined by assembler; edit the .jsx and re-assemble) ----
window.Screens = window.Screens || {};
window.Screens.Home = function Home({ go, notify }) {
  const { Button, Card, SearchField } = MD;
  const quick = [
    ['upload_file', 'Import model', 'STL, STEP, 3MF, OBJ', null],
    ['folder_open', 'Open project', 'Resume a .3mf project', null],
    ['public', 'Explore models', 'Browse the online library', null],
    ['cast', 'My devices', 'Monitor & control printers', 'device'],
  ];
  const recent = [
    ['3DBenchy.3mf', 'Edited 2 min ago · 23.4 g'], ['Phone stand v3.3mf', 'Yesterday · 41.2 g'],
    ['Cable clips ×8.3mf', 'Jul 14 · 12.7 g'], ['Vase spiral.3mf', 'Jul 9 · 88.0 g'],
  ];
  return (
    <div style={{ position: 'absolute', inset: 0, overflowY: 'auto', background: 'var(--md-surface)' }}>
      <div style={{ maxWidth: 1120, margin: '0 auto', padding: '32px 32px 56px', display: 'flex', flexDirection: 'column', gap: 26 }}>
        <div style={{ display: 'flex', gap: 20, alignItems: 'center', padding: '26px 28px', borderRadius: 28, background: 'linear-gradient(120deg, var(--md-primary-container), var(--md-secondary-container))', color: 'var(--md-on-primary-container)' }}>
          <div style={{ width: 64, height: 64, borderRadius: 20, background: 'var(--md-primary)', color: 'var(--md-on-primary)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 6px 16px var(--md-shadow)' }}><span data-icon style={{ fontSize: 36, fontVariationSettings: "'FILL' 1" }}>deployed_code</span></div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 23, fontWeight: 700 }}>Welcome back</div>
            <div style={{ fontSize: 14, opacity: .82, marginTop: 3 }}>Start a new project, open an existing one, or continue where you left off.</div>
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            <Button variant="filled" size="lg" icon="add" elevated style={{ height: 48, borderRadius: 24 }} onClick={() => go('prepare')}>New Project</Button>
            <Button variant="outlined" size="lg" icon="folder_open" style={{ height: 48, borderRadius: 24, border: '1px solid var(--md-primary)', color: 'var(--md-on-primary-container)' }}>Open</Button>
          </div>
        </div>
        <div style={{ maxWidth: 520 }}><SearchField placeholder="Search models on MakerWorld" /></div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 16 }}>
          {quick.map(q => (
            <Card key={q[1]} interactive radius={20} style={{ display: 'flex', flexDirection: 'column', gap: 10, padding: 18 }} onClick={() => q[3] ? go(q[3]) : notify(q[1], q[0])}>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: 'var(--md-secondary-container)', color: 'var(--md-on-secondary-container)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span data-icon style={{ fontSize: 24 }}>{q[0]}</span></div>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{q[1]}</div>
              <div style={{ fontSize: 12, color: 'var(--md-on-surface-variant)' }}>{q[2]}</div>
            </Card>
          ))}
        </div>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14, fontSize: 16, fontWeight: 600 }}><span data-icon style={{ fontSize: 20 }}>history</span> Recent projects</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 16 }}>
            {recent.map(r => (
              <Card key={r[0]} interactive pad={false} radius={20} style={{ overflow: 'hidden' }} onClick={() => go('prepare')}>
                <div style={{ height: 118, background: 'repeating-linear-gradient(45deg, var(--md-sc-high) 0 10px, var(--md-sc) 10px 20px)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--md-on-surface-variant)' }}><span data-icon style={{ fontSize: 40 }}>deployed_code</span></div>
                <div style={{ padding: '12px 14px' }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r[0]}</div>
                  <div style={{ fontSize: 11.5, color: 'var(--md-on-surface-variant)', marginTop: 2 }}>{r[1]}</div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

</script>
<script type="text/babel">
// ---- Prepare.jsx (inlined by assembler; edit the .jsx and re-assemble) ----
const { useState: usePrepState } = React;
window.Screens = window.Screens || {};

const FILAMENTS = [
  { name: 'Bambu PLA Basic', slot: 'AMS A1', type: 'PLA', color: '#22c55e' },
  { name: 'Bambu PLA Basic', slot: 'AMS A2', type: 'PLA', color: '#f5f5f4' },
  { name: 'Bambu PETG HF', slot: 'AMS A3', type: 'PETG', color: '#3b82f6' },
  { name: 'Bambu Support W', slot: 'AMS A4', type: 'PLA-S', color: '#78716c' },
];
window.KIT_FILAMENTS = FILAMENTS;

const GIZMOS = [
  { id: 'move', icon: 'open_with', label: 'Move' }, { id: 'rotate', icon: 'rotate_right', label: 'Rotate' },
  { id: 'scale', icon: 'open_in_full', label: 'Scale' }, { id: 'mirror', icon: 'flip', label: 'Mirror' },
  { divider: true },
  { id: 'lay', icon: 'align_horizontal_left', label: 'Lay on face' }, { id: 'cut', icon: 'carpenter', label: 'Cut' },
  { id: 'support', icon: 'foundation', label: 'Supports' }, { id: 'seam', icon: 'line_start_circle', label: 'Seam painting' },
  { id: 'color', icon: 'brush', label: 'Color painting' }, { divider: true },
  { id: 'text', icon: 'match_case', label: 'Text' }, { id: 'measure', icon: 'straighten', label: 'Measure' },
];
const SCENE_TOOLS = ['center_focus_strong', 'grid_view', 'auto_fix_high', 'content_copy', 'delete', 'undo', 'redo'];
const MANIP = [
  { label: 'Position', x: '128.0', y: '128.0', z: '0.0' }, { label: 'Rotation', x: '0°', y: '0°', z: '45°' },
  { label: 'Scale %', x: '120', y: '120', z: '120' }, { label: 'Size', x: '72.0', y: '37.2', z: '57.6' },
];

window.Screens.Prepare = function Prepare({ notify, openDialog }) {
  const [tool, setTool] = usePrepState('move');
  const [tab, setTab] = usePrepState('Quality');
  const [support, setSupport] = usePrepState(false);
  const { Button, IconButton, SectionHeader, SegmentedControl, Switch, SelectField, ValueField, SearchField, Badge, Viewport } = MD;
  return (
    <div style={{ position: 'absolute', inset: 0, display: 'flex' }}>
      <div style={{ width: 'var(--rail)', flex: '0 0 auto', background: 'var(--md-sc-low)', borderRight: '1px solid var(--md-outline-variant)', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '8px 0', gap: 3, overflowY: 'auto' }}>
        {GIZMOS.map((g, i) => g.divider ? <div key={i} style={{ width: 28, height: 1, background: 'var(--md-outline-variant)', margin: '4px 0', flex: '0 0 auto' }} />
          : <button key={g.id} title={g.label} onClick={() => { setTool(g.id); notify('Tool: ' + g.label, 'build'); }}
              style={{ width: 44, height: 44, flex: '0 0 auto', border: 'none', borderRadius: 12, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: tool === g.id ? 'var(--md-primary)' : 'transparent', color: tool === g.id ? 'var(--md-on-primary)' : 'var(--md-on-surface-variant)' }}>
              <span data-icon style={{ fontSize: 21, fontVariationSettings: tool === g.id ? "'FILL' 1" : "'FILL' 0" }}>{g.icon}</span></button>)}
      </div>
      <div style={{ flex: '1 1 auto', position: 'relative', display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', zIndex: 5, display: 'flex', alignItems: 'center', gap: 3, padding: 5, background: 'var(--md-sc)', border: '1px solid var(--md-outline-variant)', borderRadius: 16, boxShadow: 'var(--md-elev-3)' }}>
          {SCENE_TOOLS.map(s => <IconButton key={s} icon={s} size={40} iconSize={22} shape="square" style={{ borderRadius: 10, width: 40 }} />)}
        </div>
        <Viewport>
          <div style={{ position: 'absolute', left: 16, bottom: 16, width: 70, height: 70 }}>
            <div style={{ position: 'absolute', left: 6, bottom: 6, width: 2, height: 40, background: 'var(--md-axis-z)' }} />
            <div style={{ position: 'absolute', left: 6, bottom: 6, width: 40, height: 2, background: 'var(--md-axis-x)' }} />
            <div style={{ position: 'absolute', left: 8, bottom: 8, width: 26, height: 14, background: 'var(--md-axis-y)', transform: 'skewX(-45deg)', opacity: .85 }} />
            <div style={{ position: 'absolute', left: 1, bottom: 44, fontSize: 10, color: 'var(--md-axis-z)', fontWeight: 700 }}>Z</div>
            <div style={{ position: 'absolute', left: 46, bottom: 0, fontSize: 10, color: 'var(--md-axis-x)', fontWeight: 700 }}>X</div>
          </div>
          <div style={{ position: 'absolute', right: 16, bottom: 16, display: 'flex', flexDirection: 'column', gap: 6, padding: 6, background: 'var(--md-sc)', border: '1px solid var(--md-outline-variant)', borderRadius: 26, boxShadow: 'var(--md-elev-3)' }}>

  };
  const { IconButton, SegmentedControl } = MD;
  const Screen = window.Screens[view.charAt(0).toUpperCase() + view.slice(1)];
  const screenProps = { go: setView, notify, openDialog: setDialog, openHistory: () => setHistory(true), theme, setTheme, density, setDensity, accent, setAccent, seeds: SEEDS };
  return (
    <div data-theme={theme} data-density={density}
      style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', fontFamily: 'var(--md-font)', fontSize: 'var(--fs)',
        background: 'var(--md-surface)', color: 'var(--md-on-surface)', overflow: 'hidden', WebkitFontSmoothing: 'antialiased', ...accentVars(accent, theme) }}>
      {/* title bar */}
      <div style={{ height: 'var(--md-topbar-h)', flex: '0 0 auto', display: 'flex', alignItems: 'center', gap: 6, padding: '0 6px 0 12px', background: 'var(--md-sc-low)', borderBottom: '1px solid var(--md-outline-variant)' }}>
        <div style={{ width: 26, height: 26, borderRadius: 8, background: 'var(--md-primary)', color: 'var(--md-on-primary)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: 'var(--md-elev-1)' }}>
          <span data-icon style={{ fontSize: 18, fontVariationSettings: "'FILL' 1" }}>deployed_code</span>
        </div>
        <div style={{ fontWeight: 500, fontSize: 14, marginRight: 10, letterSpacing: '.1px' }}>Bambu Studio</div>
        {['File', 'Edit', 'View', 'Objects', 'Help'].map(m => (
          <button key={m} onClick={() => notify(m + ' menu', 'menu')} style={{ height: 30, padding: '0 10px', border: 'none', background: 'transparent', color: 'var(--md-on-surface-variant)', borderRadius: 8, fontSize: 13, cursor: 'pointer' }}>{m}</button>
        ))}
        <div style={{ flex: 1, height: '100%' }} />
        <button onClick={() => setHistory(true)} title="Version history — every edit is auto-saved to this project's Git repo"
          style={{ display: 'flex', alignItems: 'center', gap: 7, height: 30, padding: '0 12px', marginRight: 6, border: 'none', borderRadius: 16, background: 'var(--md-sc)', color: 'var(--md-on-surface-variant)', cursor: 'pointer', fontSize: 12 }}>
          <span data-icon style={{ fontSize: 16, color: 'var(--md-primary)' }}>account_tree</span>
          <span style={{ fontFamily: 'var(--md-font-mono)' }}>main</span>
          <span style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--md-primary)', animation: 'pulse 2s infinite' }} />
          <span style={{ fontFamily: 'var(--md-font-mono)' }}>#a1f9c02</span>
        </button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 2, marginRight: 6, padding: '0 6px', height: 30, borderRadius: 20, background: 'var(--md-sc)', color: 'var(--md-on-surface-variant)', fontSize: 12.5 }}>
          <span data-icon style={{ fontSize: 16 }}>description</span>
          <span style={{ maxWidth: 150, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>3DBenchy.3mf</span>
        </div>
        <IconButton icon="palette" size={34} iconSize={20} title="Appearance" onClick={() => setPop(!pop)} />
        <div style={{ width: 1, height: 22, background: 'var(--md-outline-variant)', margin: '0 4px' }} />
        <IconButton icon="remove" shape="square" size={32} iconSize={18} />
        <IconButton icon="crop_square" shape="square" size={32} iconSize={15} />
        <IconButton icon="close" shape="square" size={32} iconSize={18} danger />
      </div>
      {/* tab bar */}
      <div style={{ height: 'var(--md-navbar-h)', flex: '0 0 auto', display: 'flex', alignItems: 'stretch', padding: '0 8px', gap: 2, background: 'var(--md-surface)', borderBottom: '1px solid var(--md-outline-variant)', overflowX: 'auto' }}>
        {TABS.map(t => {
          const on = t.id === view;
          return (
            <button key={t.id} data-screen-label={t.label} onClick={() => setView(t.id)} onMouseEnter={() => setHovTab(t.id)} onMouseLeave={() => setHovTab(null)}
              style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 8, padding: '0 16px', border: 'none', cursor: 'pointer', whiteSpace: 'nowrap',
                background: hovTab === t.id ? 'var(--md-sc-low)' : 'transparent', color: on ? 'var(--md-primary)' : 'var(--md-on-surface-variant)', fontSize: 13.5, fontWeight: on ? 600 : 400 }}>
              <span data-icon style={{ fontSize: 20, fontVariationSettings: on ? "'FILL' 1" : "'FILL' 0" }}>{t.icon}</span>
              <span>{t.label}</span>
              <div style={{ position: 'absolute', left: 12, right: 12, bottom: 0, height: 3, borderRadius: '3px 3px 0 0', background: on ? 'var(--md-primary)' : 'transparent' }} />
            </button>
          );
        })}
      </div>
      {/* body */}
      <div style={{ flex: '1 1 auto', position: 'relative', overflow: 'hidden', background: 'var(--md-surface-dim)' }}>
        <Screen {...screenProps} />
      </div>
      {/* appearance popover */}
      {pop && (
        <div onClick={() => setPop(false)} style={{ position: 'absolute', inset: 0, zIndex: 40 }}>
          <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', top: 52, right: 12, width: 'var(--md-popover-w)', background: 'var(--md-sc)', border: '1px solid var(--md-outline-variant)', borderRadius: 24, boxShadow: 'var(--md-elev-4)', padding: 18, display: 'flex', flexDirection: 'column', gap: 16, animation: 'mdfade .18s ease' }}>
            <div style={{ fontSize: 15, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8 }}><span data-icon style={{ fontSize: 20 }}>palette</span> Appearance</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ fontSize: 12, color: 'var(--md-on-surface-variant)' }}>Theme</div>
              <SegmentedControl size="md" value={theme} onChange={setTheme} options={[{ id: 'light', label: 'Light', icon: 'light_mode' }, { id: 'dark', label: 'Dark', icon: 'dark_mode' }]} />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ fontSize: 12, color: 'var(--md-on-surface-variant)' }}>Density</div>
              <SegmentedControl size="md" value={density} onChange={setDensity} options={[{ id: 'comfortable', label: 'Comfortable' }, { id: 'compact', label: 'Compact' }]} />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ fontSize: 12, color: 'var(--md-on-surface-variant)' }}>Accent color</div>
              <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                {SEEDS.map(s => (
                  <button key={s[0]} title={s[1]} onClick={() => setAccent(s[0])}
                    style={{ width: 34, height: 34, borderRadius: '50%', cursor: 'pointer', background: s[0], border: accent === s[0] ? '2px solid var(--md-on-surface)' : '2px solid transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff' }}>
                    <span data-icon style={{ fontSize: 18, opacity: accent === s[0] ? 1 : 0 }}>check</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
      {/* overlays */}
      {history && <window.Overlays.HistoryDrawer onClose={() => setHistory(false)} notify={notify} />}
      {dialog === 'export' && <window.Overlays.ExportDialog onClose={() => setDialog(null)} notify={notify} />}
      {dialog === 'send' && <window.Overlays.SendDialog onClose={() => setDialog(null)} notify={notify} />}
      {dialog === 'addfil' && <window.Overlays.AddFilamentDialog onClose={() => setDialog(null)} notify={notify} />}
      {/* snackbars */}
      <div style={{ position: 'absolute', left: '50%', bottom: 22, transform: 'translateX(-50%)', zIndex: 90, display: 'flex', flexDirection: 'column-reverse', gap: 10, pointerEvents: 'none', width: 'min(560px,92vw)' }}>
        {snacks.map(n => (
          <div key={n.id} style={{ pointerEvents: 'auto', display: 'flex', alignItems: 'center', gap: 12, padding: '12px 10px 12px 16px', background: 'var(--md-inverse-surface)', color: 'var(--md-inverse-on)', borderRadius: 12, boxShadow: 'var(--md-elev-4)', animation: 'mdfade .2s ease' }}>
            <span data-icon style={{ fontSize: 20, color: 'var(--md-inverse-primary)' }}>{n.icon}</span>
            <span style={{ flex: 1, fontSize: 13 }}>{n.message}</span>
            <button onClick={() => setSnacks(s => s.filter(x => x.id !== n.id))} style={{ width: 28, height: 28, border: 'none', background: 'transparent', color: 'var(--md-inverse-on)', borderRadius: '50%', cursor: 'pointer', opacity: .7 }}><span data-icon style={{ fontSize: 16 }}>close</span></button>
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);

</script>
</body>
</html>
