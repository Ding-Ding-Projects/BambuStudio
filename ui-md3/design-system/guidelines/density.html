<!-- @dsCard group="Spacing" viewport="700x240" subtitle="Two persisted density modes scale seven tokens together" name="Density modes" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{padding:14px;font-family:var(--md-font);color:var(--md-on-surface);}</style></head><body>
<table style="width:100%;border-collapse:collapse;font-size:12px;">
<tr style="font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--md-on-surface-variant);text-align:left;"><th style="padding:4px 8px;">token</th><th>--gap</th><th>--pad</th><th>--row</th><th>--fs</th><th>--rail</th><th>--sidebar</th><th>--radius</th><th>--radius-s</th></tr>
<tr style="font-family:var(--md-font-mono);"><td style="padding:6px 8px;font-family:var(--md-font);font-weight:500;">comfortable</td><td>12</td><td>16</td><td>40</td><td>14</td><td>60</td><td>344</td><td>16</td><td>10</td></tr>
<tr style="font-family:var(--md-font-mono);"><td style="padding:6px 8px;font-family:var(--md-font);font-weight:500;">compact</td><td>7</td><td>10</td><td>32</td><td>13</td><td>50</td><td>312</td><td>12</td><td>8</td></tr>
</table>
<div style="display:flex;gap:12px;margin-top:12px;">
<div data-density="comfortable" style="flex:1;background:var(--md-sc-low);border:1px solid var(--md-outline-variant);border-radius:var(--radius);padding:var(--pad);display:flex;flex-direction:column;gap:var(--gap);"><div style="font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--md-on-surface-variant);">comfortable</div><div style="height:var(--row);display:flex;align-items:center;padding:0 12px;background:var(--md-sc-highest);border-radius:var(--radius-s);font-size:var(--fs);">Row · 40px</div></div>
<div data-density="compact" style="flex:1;background:var(--md-sc-low);border:1px solid var(--md-outline-variant);border-radius:var(--radius);padding:var(--pad);display:flex;flex-direction:column;gap:var(--gap);"><div style="font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--md-on-surface-variant);">compact</div><div style="height:var(--row);display:flex;align-items:center;padding:0 12px;background:var(--md-sc-highest);border-radius:var(--radius-s);font-size:var(--fs);">Row · 32px</div></div>
</div></body></html>
