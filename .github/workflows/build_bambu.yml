on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: false
        type: string

jobs:
  build_bambu:
    name: Build BambuStudio
    runs-on: ${{ inputs.os }}
    env:
      date:
      ver:
      ver_pure:

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          lfs: 'true'

      - name: load cached deps
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ inputs.cache-path }}
          key: ${{ inputs.cache-key }}
          fail-on-cache-miss: true

      - name: Get the version and date on Ubuntu and macOS
        if: inputs.os != 'windows-latest'
        run: |
          ver_pure=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ver="PR-${{ github.event.number }}"
          else
            ver=V$ver_pure
          fi
          echo "ver=$ver" >> $GITHUB_ENV
          echo "ver_pure=$ver_pure" >> $GITHUB_ENV
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - name: Get the version and date on Windows
        if: inputs.os == 'windows-latest'
        run: |
          $date = Get-Date -Format 'yyyyMMdd'
          $ref = "${{ github.ref }}"
          $eventName = "${{ github.event_name }}"
          $prNumber = "${{ github.event.number }}"

          if ($eventName -eq 'pull_request') {
              $ver = "PR" + $prNumber
          } else {
              $versionContent = Get-Content version.inc -Raw
              if ($versionContent -match 'set\(SLIC3R_VERSION "(.*?)"\)') {
                  $ver = $matches[1]
              }
              $ver = "V$ver"
          }

          echo "ver=$ver" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "date=$date" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "date: ${{ env.date }} version: ${{ env.ver }}"
        shell: pwsh

  #   Mac
      - name: Build slicer mac
        if: inputs.os == 'macos-15-intel'
        working-directory: ${{ github.workspace }}
        run: |
          brew install automake texinfo
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0
          ./BuildMac.sh -s -x -a x86_64 -t 10.15 -1

      - name: Build slicer mac
        if: inputs.os == 'macos-15' || inputs.os == 'macos-26'
        working-directory: ${{ github.workspace }}
        run: |
          brew install automake texinfo
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0
          ./BuildMac.sh -s -x -a universal -t 10.15 -1

      - name: pack mac app
        if: github.ref != 'refs/heads/main' && (inputs.os == 'macos-15-intel' || inputs.os == 'macos-15' || inputs.os == 'macos-26')
        working-directory: ${{ github.workspace }}
        run: zip -r BambuStudio_Mac_${{inputs.arch}}_${{ env.ver }}.zip ${{ github.workspace }}/build

      - name: Upload artifacts mac
        if: inputs.os == 'macos-15-intel' || inputs.os == 'macos-15' || inputs.os == 'macos-26'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: BambuStudio_Mac_${{inputs.arch}}_${{ env.ver }}
          path: ${{ github.workspace }}/BambuStudio_Mac_${{inputs.arch}}_${{ env.ver }}.zip

  # Windows
      - name: setup MSVC
        if: inputs.os == 'windows-latest'
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      # Ninja + sccache: the Visual Studio generator ignores compiler
      # launchers, so the app build runs under Ninja with cl.exe from this
      # dev environment; sccache then caches object files across runs via
      # the Actions cache (warm pushes skip most of the ~2 h compile).
      - name: Setup MSVC developer environment for Ninja
        if: inputs.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Setup sccache
        if: inputs.os == 'windows-latest'
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Install nsis and pkgconfig
        if: inputs.os == 'windows-latest'
        run: |
          dir "C:/Program Files (x86)/Windows Kits/10/Include"
          choco install nsis --version=3.12.0 --yes --no-progress
          choco install pkgconfiglite --version=0.28.0 --yes --no-progress

      - name: Setup Node.js for Windows checks
        if: inputs.os == 'windows-latest'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'

      - name: Test Windows release inputs
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: .\scripts\ci\Test-WindowsRelease.ps1

      - name: Build slicer Win
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          cmake -S . -B build `
            -G Ninja `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DBBL_RELEASE_TO_PUBLIC=1 `
            -DBBL_INTERNAL_TESTING=0 `
            -DSLIC3R_BUILD_TESTS=OFF `
            '-DCMAKE_PREFIX_PATH=${{ github.workspace }}\deps\build\BambuStudio_dep\usr\local' `
            '-DCMAKE_INSTALL_PREFIX=${{ github.workspace }}\install-dir' `
            -DCMAKE_BUILD_TYPE=Release `
            '-DWIN10SDK_PATH=C:/Program Files (x86)/Windows Kits/10/Include/10.0.22000.0'
          if ($LASTEXITCODE -ne 0) {
              throw "Configuring the production Windows build failed with exit code $LASTEXITCODE."
          }

          # Use the product CMake toolchain's hash-pinned Node 22.22.2 and
          # pnpm 10.12.1, not a parallel npm dependency graph.
          $pnpmExecutable = [System.IO.Path]::GetFullPath(
              (Join-Path $env:GITHUB_WORKSPACE '..\node-cache\node-v22.22.2-win-x64\pnpm.exe')
          )
          if (-not (Test-Path -LiteralPath $pnpmExecutable -PathType Leaf)) {
              throw "The hash-pinned production pnpm executable is missing at '$pnpmExecutable'."
          }
          Push-Location 'src\slic3r\GUI\DeviceWeb\device_page'
          try {
              & $pnpmExecutable audit --audit-level high
              if ($LASTEXITCODE -ne 0) {
                  throw "The production DeviceWeb lock has a high-severity advisory or audit failure (exit $LASTEXITCODE)."
              }
          }
          finally {
              Pop-Location
          }

          cmake --build build --target device_page_build --config Release --parallel
          if ($LASTEXITCODE -ne 0) {
              throw "Building and type-checking DeviceWeb failed with exit code $LASTEXITCODE."
          }
          git diff --exit-code -- src/slic3r/GUI/DeviceWeb/device_page/src/routeTree.gen.ts
          if ($LASTEXITCODE -ne 0) {
              throw 'The pinned production DeviceWeb build regenerated a stale routeTree.gen.ts.'
          }

          cmake --build build --target install --config Release --parallel
          if ($LASTEXITCODE -ne 0) {
              throw "Building the production Windows installer payload failed with exit code $LASTEXITCODE."
          }

      # Stage the Mesa llvmpipe software-OpenGL fallback into the payload's
      # mesa/ subfolder before SBOM generation, the portable zip, and NSIS
      # packaging. The app copies these DLLs beside bambu-studio.exe and
      # relaunches itself when the host GPU driver offers no OpenGL >= 2.0
      # (see docs/features/windows/software-gl-fallback.md). The archive is a
      # hash-pinned upstream release: any content change fails the build.
      - name: Stage Mesa software OpenGL fallback payload
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Pinned: pal1000/mesa-dist-win 26.1.3 (release-msvc, x64), published 2026-06-26.
          $mesaVersion = '26.1.3'
          $mesaUrl = "https://github.com/pal1000/mesa-dist-win/releases/download/$mesaVersion/mesa3d-$mesaVersion-release-msvc.7z"
          $mesaArchiveSha256 = '6dd431f4620cea73970b13e3ffa94f721f2a3924306b8a4283c97648cdb6eb9c'
          # Per-file pins of the two x64 DLLs actually shipped.
          $expectedFileHashes = @{
              'opengl32.dll'       = '12499866437a161d2b250d5105188ae00732dd74b4bebbcdf972e6145af00f9e'
              'libgallium_wgl.dll' = '1895f8c19ede5efd0497f9dfab463b19bf4377e3af7c06c2d4d073e4680c5f69'
          }

          $archive = Join-Path $env:RUNNER_TEMP "mesa3d-$mesaVersion-release-msvc.7z"
          Invoke-WebRequest -Uri $mesaUrl -OutFile $archive -MaximumRetryCount 3 -RetryIntervalSec 15

          $actualArchiveHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualArchiveHash -ne $mesaArchiveSha256) {
              throw "Mesa archive SHA-256 mismatch: expected $mesaArchiveSha256, got $actualArchiveHash. Refusing to package an unverified OpenGL driver."
          }

          $extractDir = Join-Path $env:RUNNER_TEMP 'mesa3d-x64'
          & 'C:\Program Files\7-Zip\7z.exe' x $archive "-o$extractDir" 'x64\opengl32.dll' 'x64\libgallium_wgl.dll' -y
          if ($LASTEXITCODE -ne 0) {
              throw "Extracting the Mesa x64 DLLs failed with exit code $LASTEXITCODE."
          }

          $mesaPayloadDir = Join-Path '${{ github.workspace }}\install-dir' 'mesa'
          New-Item -ItemType Directory -Path $mesaPayloadDir -Force | Out-Null
          foreach ($name in @('opengl32.dll', 'libgallium_wgl.dll')) {
              $source = Join-Path (Join-Path $extractDir 'x64') $name
              if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
                  throw "The pinned Mesa archive did not contain x64\$name."
              }
              $actual = (Get-FileHash -LiteralPath $source -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -ne $expectedFileHashes[$name]) {
                  throw "Mesa $name SHA-256 mismatch: expected $($expectedFileHashes[$name]), got $actual."
              }
              Copy-Item -LiteralPath $source -Destination (Join-Path $mesaPayloadDir $name)
          }
          Write-Host "Staged Mesa $mesaVersion llvmpipe fallback DLLs into install-dir\mesa."

      - name: Build and run Windows C++ tests
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake -S . -B build-tests `
            -G 'Visual Studio 18 2026' `
            -A X64 `
            -DBBL_RELEASE_TO_PUBLIC=1 `
            -DBBL_INTERNAL_TESTING=0 `
            -DSLIC3R_BUILD_TESTS=ON `
            '-DCMAKE_PREFIX_PATH=${{ github.workspace }}\deps\build\BambuStudio_dep\usr\local' `
            '-DCMAKE_INSTALL_PREFIX=${{ runner.temp }}\BambuStudioMD3-test-install' `
            -DCMAKE_BUILD_TYPE=Release `
            '-DWIN10SDK_PATH=C:/Program Files (x86)/Windows Kits/10/Include/10.0.22000.0'
          if ($LASTEXITCODE -ne 0) {
              throw "Configuring the isolated Windows C++ test tree failed with exit code $LASTEXITCODE."
          }

          # The aggregate legacy suite and libnest2d_tests are currently
          # upstream-baseline failures; keep this gate focused on maintained,
          # independently buildable regression coverage. See HANDOFF.md.
          cmake --build build-tests --target language_mode_tests project_history_tests deterministic_bbs_3mf_tests --config Release -- -m
          if ($LASTEXITCODE -ne 0) {
              throw "Building Windows C++ tests failed with exit code $LASTEXITCODE."
          }

          $env:PATH = '${{ github.workspace }}\install-dir;' + $env:PATH
          ctest --test-dir build-tests -C Release --output-on-failure --no-tests=error -R '^(language_mode_tests|project_history_tests|deterministic_bbs_3mf_tests)$'
          if ($LASTEXITCODE -ne 0) {
              throw "Windows C++ tests failed with exit code $LASTEXITCODE."
          }

      - name: Exercise native Windows light, dark, and language visuals
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          .\scripts\ci\Test-WindowsNativeVisual.ps1 `
            -Application '${{ github.workspace }}\install-dir\bambu-studio.exe' `
            -OutputDir '${{ runner.temp }}\BambuStudioMD3-NativeVisual-Evidence' `
            -CiExecutionApproved

      - name: Upload native Windows visual evidence
        if: always() && inputs.os == 'windows-latest'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: BambuStudio_Windows_native_visual_${{ env.ver }}
          path: |
            ${{ runner.temp }}\BambuStudioMD3-NativeVisual-Evidence\*.png
            ${{ runner.temp }}\BambuStudioMD3-NativeVisual-Evidence\*.json
          if-no-files-found: warn

      - name: Generate Windows payload SBOM
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $versionContent = Get-Content version.inc -Raw
          if ($versionContent -notmatch 'set\(SLIC3R_VERSION "([^"]+)"\)') {
              throw 'Could not read SLIC3R_VERSION from version.inc.'
          }

          .\scripts\ci\New-WindowsCycloneDxSbom.ps1 `
            -PayloadDir '${{ github.workspace }}\install-dir' `
            -OutputPath '${{ github.workspace }}\BambuStudioMD3.cdx.json' `
            -Version $matches[1] `
            -Commit '${{ github.sha }}' `
            -Repository '${{ github.repository }}'

      # - name: Create installer Win
      #   if: inputs.os == 'windows-latest'
      #   working-directory: ${{ github.workspace }}/build
      #   run: |
      #     cpack -G NSIS

      - name: Pack app
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: '"C:/Program Files/7-Zip/7z.exe" a -tzip BambuStudio_Windows_${{ env.ver }}_portable.zip ${{ github.workspace }}/install-dir'

      - name: Create Windows installer
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $versionContent = Get-Content version.inc -Raw
          if ($versionContent -notmatch 'set\(SLIC3R_VERSION "([^"]+)"\)') {
              throw 'Could not read SLIC3R_VERSION from version.inc.'
          }

          $productVersion = $matches[1]
          $numericParts = @([regex]::Matches($productVersion, '\d+') | ForEach-Object { [int]$_.Value })
          if ($numericParts.Count -gt 4) {
              $numericParts = @($numericParts[0..3])
          }
          while ($numericParts.Count -lt 4) {
              $numericParts += 0
          }
          if ($numericParts | Where-Object { $_ -gt 65535 }) {
              throw "Version '$productVersion' contains a component larger than 65535."
          }
          $fileVersion = $numericParts -join '.'
          $makensis = 'C:\Program Files (x86)\NSIS\makensis.exe'
          if (-not (Test-Path -LiteralPath $makensis)) {
              throw "NSIS compiler was not found at $makensis."
          }

          $uninstallInclude = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-UninstallFiles.nsh'
          & '${{ github.workspace }}\packaging\windows\GenerateUninstallInclude.ps1' `
            -PayloadDir '${{ github.workspace }}\install-dir' `
            -OutputPath $uninstallInclude

          & $makensis /V3 /INPUTCHARSET UTF8 `
            "/DPRODUCT_VERSION=$productVersion" `
            "/DFILE_VERSION=$fileVersion" `
            "/DPAYLOAD_DIR=${{ github.workspace }}\install-dir" `
            "/DOUT_FILE=${{ github.workspace }}\BambuStudioMD3-Setup.exe" `
            "/DINSTALLER_ICON=${{ github.workspace }}\resources\images\BambuStudio.ico" `
            "/DUNINSTALL_INCLUDE=$uninstallInclude" `
            "${{ github.workspace }}\packaging\windows\BambuStudioMD3.nsi"

          if ($LASTEXITCODE -ne 0) {
              throw "makensis failed with exit code $LASTEXITCODE."
          }

          & 'C:\Program Files\7-Zip\7z.exe' t "${{ github.workspace }}\BambuStudioMD3-Setup.exe"
          if ($LASTEXITCODE -ne 0) {
              throw "Installer archive validation failed with exit code $LASTEXITCODE."
          }

      - name: Validate MD3 installer pages and from-source helpers
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          # Static, no-execution validation of the MD3 restyle + build-from-source
          # additions to the installer. The heavy "Create Windows installer" step
          # already proved the real .nsi (and its new custom pages) compile with
          # makensis; from-source itself is interactive-only and never runs in CI
          # (see docs/features/releases/windows-build-from-source.md), so here it
          # degrades to compile-and-static-check only.
          $packagingDir = Join-Path $env:GITHUB_WORKSPACE 'packaging\windows'
          $nsiPath = Join-Path $packagingDir 'BambuStudioMD3.nsi'
          $bfsDir = Join-Path $packagingDir 'build-from-source'

          # 1. The .nsi must keep its UTF-8 BOM (makensis /INPUTCHARSET UTF8 relies on
          #    it to decode the inline Cantonese strings).
          $nsiBytes = [System.IO.File]::ReadAllBytes($nsiPath)
          if ($nsiBytes.Length -lt 3 -or $nsiBytes[0] -ne 0xEF -or $nsiBytes[1] -ne 0xBB -or $nsiBytes[2] -ne 0xBF) {
              throw 'BambuStudioMD3.nsi lost its UTF-8 BOM.'
          }

          # 2. Every makensis invocation in this workflow keeps /INPUTCHARSET UTF8.
          $workflowPath = Join-Path $env:GITHUB_WORKSPACE '.github\workflows\build_bambu.yml'
          $workflowLines = @(Get-Content -LiteralPath $workflowPath)
          $makensisLines = @($workflowLines | Where-Object { $_ -match '&\s+\$makensis\b' })
          $charsetLines = @($makensisLines | Where-Object { $_ -match '/INPUTCHARSET\s+UTF8' })
          if ($makensisLines.Count -lt 5 -or $charsetLines.Count -ne $makensisLines.Count) {
              throw "Every makensis call must keep /INPUTCHARSET UTF8; found $($makensisLines.Count) call(s), $($charsetLines.Count) carrying the flag."
          }

          # 3. The three from-source PowerShell helpers exist and parse.
          foreach ($helper in @('Build-FromSource.ps1', 'Toolchain.ps1', 'Opencode.ps1')) {
              $helperPath = Join-Path $bfsDir $helper
              if (-not (Test-Path -LiteralPath $helperPath -PathType Leaf)) {
                  throw "Missing from-source helper: $helperPath"
              }
              $null = [scriptblock]::Create((Get-Content -LiteralPath $helperPath -Raw))
          }

          # 4. Structural tokens the new pages / flows must contain.
          $nsi = Get-Content -LiteralPath $nsiPath -Raw -Encoding UTF8
          $mustContain = @(
              'Function WelcomePageCreate',
              'Function InstallModePageCreate',
              'Function BuildProgressPageCreate',
              'Function FinishPageCreate',
              '"InstallSource"',
              '.md3-owned-manifest.txt',
              'GetSystemMenu',
              'DeleteMenu',
              'SC_CLOSE'
          )
          foreach ($needle in $mustContain) {
              if (-not $nsi.Contains($needle)) {
                  throw "BambuStudioMD3.nsi is missing expected token: $needle"
              }
          }

          # 5. Silent mode must force the prebuilt path and skip the mode chooser.
          $imStart = $nsi.IndexOf('Function InstallModePageCreate')
          $imEnd = $nsi.IndexOf('FunctionEnd', [Math]::Max($imStart, 0))
          if ($imStart -lt 0 -or $imEnd -lt 0) { throw 'InstallModePageCreate is malformed.' }
          $imBody = $nsi.Substring($imStart, $imEnd - $imStart)
          foreach ($needle in @('${Silent}', 'StrCpy $InstallMode "prebuilt"', 'Abort')) {
              if (-not $imBody.Contains($needle)) {
                  throw "InstallModePageCreate silent-mode prebuilt guard is missing '$needle'."
              }
          }

          # 6. Each new page string is bilingual: an EN label with a Cantonese (CJK)
          #    counterpart within the same MD3BiText block. Checked without embedding
          #    CJK literals in this workflow (encoding-robust).
          $enStrings = @(
              'How would you like to install?',
              'Install prebuilt (recommended)',
              'Build from source (advanced',
              'Building Bambu Studio MD3 from source',
              'This can take a long time'
          )
          foreach ($en in $enStrings) {
              $idx = $nsi.IndexOf($en)
              if ($idx -lt 0) { throw "Missing EN installer string: $en" }
              $window = $nsi.Substring($idx, [Math]::Min(600, $nsi.Length - $idx))
              $hasCjk = $false
              foreach ($ch in $window.ToCharArray()) {
                  $code = [int][char]$ch
                  if ($code -ge 0x4E00 -and $code -le 0x9FFF) { $hasCjk = $true; break }
              }
              if (-not $hasCjk) {
                  throw "No Cantonese counterpart found near EN string: $en"
              }
          }

          # 7. The opencode blanket-allow emitter keeps its security posture:
          #    question=deny and external_directory=deny (grant scoped to the clone),
          #    while action classes stay allow.
          . (Join-Path $bfsDir 'Opencode.ps1')
          $emitterDir = Join-Path $env:RUNNER_TEMP ('bfs-opencode-check-' + [guid]::NewGuid().ToString('N'))
          try {
              $configPath = New-OpencodeAllowConfig -CloneDir $emitterDir
              $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
              if ($config.permission.question -ne 'deny') {
                  throw "opencode config: question must be 'deny', got '$($config.permission.question)'."
              }
              if ($config.permission.external_directory -ne 'deny') {
                  throw "opencode config: external_directory must be 'deny', got '$($config.permission.external_directory)'."
              }
              if ($config.permission.edit -ne 'allow' -or $config.permission.bash -ne 'allow') {
                  throw 'opencode config: action classes edit/bash must be allow.'
              }
          }
          finally {
              if (Test-Path -LiteralPath $emitterDir) {
                  Remove-Item -LiteralPath $emitterDir -Recurse -Force
              }
          }

          Write-Host 'MD3 installer page and from-source helper validation passed.'

      - name: Test Windows install, upgrade, and uninstall behavior
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $versionContent = Get-Content version.inc -Raw
          if ($versionContent -notmatch 'set\(SLIC3R_VERSION "([^"]+)"\)') {
              throw 'Could not read SLIC3R_VERSION from version.inc.'
          }

          $productVersion = $matches[1]
          $numericParts = @([regex]::Matches($productVersion, '\d+') | ForEach-Object { [int]$_.Value })
          if ($numericParts.Count -gt 4) {
              $numericParts = @($numericParts[0..3])
          }
          while ($numericParts.Count -lt 4) {
              $numericParts += 0
          }
          $fileVersion = $numericParts -join '.'

          $obsoleteRelativePath = 'md3-ci-obsolete-owned-file.txt'
          $obsoletePayloadPath = Join-Path '${{ github.workspace }}\install-dir' $obsoleteRelativePath
          $previousInstaller = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-PreviousFixture.exe'
          $previousUninstallInclude = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-PreviousFixture-UninstallFiles.nsh'
          $ancestorGuardRoot = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-AncestorGuard'
          $ancestorGuardPrograms = Join-Path $ancestorGuardRoot 'Programs'
          $ancestorGuardInstallDir = Join-Path $ancestorGuardPrograms 'Bambu Studio MD3'
          $ancestorGuardInstaller = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-AncestorGuardFixture.exe'
          $bootstrapFailureInstaller = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-BootstrapFailureFixture.exe'
          $shortcutGuardRoot = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-ShortcutGuard'
          $shortcutGuardDir = Join-Path $shortcutGuardRoot 'Bambu Studio MD3'
          $shortcutGuardInstaller = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-ShortcutGuardFixture.exe'
          $guardPayload = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-GuardPayload'
          $guardUninstallInclude = Join-Path $env:RUNNER_TEMP 'BambuStudioMD3-GuardPayload-UninstallFiles.nsh'
          $makensis = 'C:\Program Files (x86)\NSIS\makensis.exe'

          try {
              Set-Content -LiteralPath $obsoletePayloadPath -Value 'Owned only by the previous CI fixture.' -Encoding ascii
              & '${{ github.workspace }}\packaging\windows\GenerateUninstallInclude.ps1' `
                -PayloadDir '${{ github.workspace }}\install-dir' `
                -OutputPath $previousUninstallInclude

              & $makensis /V2 /INPUTCHARSET UTF8 `
                "/DPRODUCT_VERSION=$productVersion" `
                "/DFILE_VERSION=$fileVersion" `
                "/DPAYLOAD_DIR=${{ github.workspace }}\install-dir" `
                "/DOUT_FILE=$previousInstaller" `
                "/DINSTALLER_ICON=${{ github.workspace }}\resources\images\BambuStudio.ico" `
                "/DUNINSTALL_INCLUDE=$previousUninstallInclude" `
                '${{ github.workspace }}\packaging\windows\BambuStudioMD3.nsi'

              if ($LASTEXITCODE -ne 0) {
                  throw "Creating the previous-version installer fixture failed with exit code $LASTEXITCODE."
              }

              New-Item -ItemType Directory -Path $guardPayload | Out-Null
              Set-Content -LiteralPath (Join-Path $guardPayload 'bambu-studio.exe') `
                -Value 'CI-only destination-guard fixture.' -Encoding ascii
              Copy-Item -LiteralPath '${{ github.workspace }}\LICENSE' `
                -Destination (Join-Path $guardPayload 'LICENSE.txt')
              & '${{ github.workspace }}\packaging\windows\GenerateUninstallInclude.ps1' `
                -PayloadDir $guardPayload `
                -OutputPath $guardUninstallInclude

              & $makensis /V2 /INPUTCHARSET UTF8 `
                "/DPRODUCT_VERSION=$productVersion" `
                "/DFILE_VERSION=$fileVersion" `
                "/DPAYLOAD_DIR=$guardPayload" `
                "/DOUT_FILE=$ancestorGuardInstaller" `
                "/DINSTALLER_ICON=${{ github.workspace }}\resources\images\BambuStudio.ico" `
                "/DUNINSTALL_INCLUDE=$guardUninstallInclude" `
                "/DPRODUCT_INSTALL_ROOT=$ancestorGuardRoot" `
                "/DPRODUCT_PROGRAMS_DIR=$ancestorGuardPrograms" `
                "/DPRODUCT_INSTALL_DIR=$ancestorGuardInstallDir" `
                '${{ github.workspace }}\packaging\windows\BambuStudioMD3.nsi'

              if ($LASTEXITCODE -ne 0) {
                  throw "Creating the ancestor-guard installer fixture failed with exit code $LASTEXITCODE."
              }

              & $makensis /V2 /INPUTCHARSET UTF8 `
                "/DPRODUCT_VERSION=$productVersion" `
                "/DFILE_VERSION=$fileVersion" `
                "/DPAYLOAD_DIR=$guardPayload" `
                "/DOUT_FILE=$bootstrapFailureInstaller" `
                "/DINSTALLER_ICON=${{ github.workspace }}\resources\images\BambuStudio.ico" `
                "/DUNINSTALL_INCLUDE=$guardUninstallInclude" `
                /DTEST_FORCE_BOOTSTRAP_CLEANUP_FAILURE `
                '${{ github.workspace }}\packaging\windows\BambuStudioMD3.nsi'

              if ($LASTEXITCODE -ne 0) {
                  throw "Creating the bootstrap-failure installer fixture failed with exit code $LASTEXITCODE."
              }

              & $makensis /V2 /INPUTCHARSET UTF8 `
                "/DPRODUCT_VERSION=$productVersion" `
                "/DFILE_VERSION=$fileVersion" `
                "/DPAYLOAD_DIR=$guardPayload" `
                "/DOUT_FILE=$shortcutGuardInstaller" `
                "/DINSTALLER_ICON=${{ github.workspace }}\resources\images\BambuStudio.ico" `
                "/DUNINSTALL_INCLUDE=$guardUninstallInclude" `
                "/DPRODUCT_SHORTCUT_ROOT=$shortcutGuardRoot" `
                "/DPRODUCT_SHORTCUT_DIR=$shortcutGuardDir" `
                '${{ github.workspace }}\packaging\windows\BambuStudioMD3.nsi'

              if ($LASTEXITCODE -ne 0) {
                  throw "Creating the shortcut-guard installer fixture failed with exit code $LASTEXITCODE."
              }
          }
          finally {
              Remove-Item -LiteralPath $obsoletePayloadPath -Force -ErrorAction SilentlyContinue
          }

          .\scripts\ci\Test-WindowsInstaller.ps1 `
            -Installer '${{ github.workspace }}\BambuStudioMD3-Setup.exe' `
            -PreviousInstaller $previousInstaller `
            -PreviousOwnedFile $obsoleteRelativePath `
            -Sbom '${{ github.workspace }}\BambuStudioMD3.cdx.json' `
            -AncestorGuardInstaller $ancestorGuardInstaller `
            -BootstrapFailureInstaller $bootstrapFailureInstaller `
            -ShortcutGuardInstaller $shortcutGuardInstaller `
            -AncestorGuardRoot $ancestorGuardRoot `
            -ShortcutGuardRoot $shortcutGuardRoot `
            -CiExecutionApproved

      # - name: Pack PDB
      #   if: inputs.os == 'windows-latest'
      #   working-directory: ${{ github.workspace }}/build/src/Release
      #   shell: cmd
      #   run: '"C:/Program Files/7-Zip/7z.exe" a -m0=lzma2 -mx9 Debug_PDB_${{ env.ver }}_for_developers_only.7z  *.pdb'

      - name: Upload artifacts Win zip
        if: inputs.os == 'windows-latest'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: BambuStudio_Windows_${{ env.ver }}_portable
          path: ${{ github.workspace }}/BambuStudio_Windows_${{ env.ver }}_portable.zip

      - name: Upload Windows installer
        if: inputs.os == 'windows-latest'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: BambuStudio_Windows_${{ env.ver }}_installer
          path: |
            ${{ github.workspace }}/BambuStudioMD3-Setup.exe
            ${{ github.workspace }}/BambuStudioMD3.cdx.json
          if-no-files-found: error


  # Ubuntu
      - name: Install dependencies from BuildLinux.sh
        if: inputs.os == 'ubuntu-22.04' || inputs.os == 'ubuntu-24.04' || inputs.os == 'ubuntu-26.04'
